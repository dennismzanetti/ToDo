<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="To-Do" />
  <meta name="theme-color" content="#4a7c6f" />
  <title>Templates – To-Do List</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./css/styles.css" />
  <link rel="manifest" href="./manifest.json" />
  <link rel="apple-touch-icon" href="./icons/icon-192.png" />
</head>
<body>
  <a class="skip-link" href="#templates-view">Skip to content</a>

  <header class="topbar">
    <div class="brand">
      <svg viewBox="0 0 64 64" aria-label="To-Do List" role="img" class="logo" width="36" height="36">
        <rect x="10" y="8" width="44" height="48" rx="10" stroke="currentColor" stroke-width="4" fill="none"/>
        <path d="M20 24h24M20 34h24M20 44h14" stroke="currentColor" stroke-width="4" stroke-linecap="round"/>
        <path d="M15 24l3 3 6-7" stroke="currentColor" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
      <span class="brand-name">To-Do List</span>
    </div>

    <nav class="main-nav" aria-label="Main navigation">
      <a class="nav-btn" href="index.html">Board</a>
      <a class="nav-btn active" href="templates.html">Templates</a>
    </nav>

    <button class="icon-btn" data-theme-toggle aria-label="Toggle theme">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></svg>
    </button>
  </header>

  <!-- Templates view -->
  <main id="templates-view" class="templates-view">
    <div class="templates-header">
      <div>
        <h2 class="templates-title">Task Templates</h2>
        <p class="text-muted">Recurring tasks automatically added to your board each week.</p>
      </div>
      <button class="primary-btn" id="new-template-btn">+ New template</button>
    </div>
    <div id="templates-list" class="templates-grid"></div>
    <div class="template-empty" id="templates-empty" style="display:none">
      <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="3" width="18" height="18" rx="3"/><path d="M9 12h6M12 9v6"/></svg>
      <h3>No templates yet</h3>
      <p>Create a template to automatically add recurring tasks to your board each week.</p>
      <button class="primary-btn" id="empty-new-template-btn">+ New template</button>
    </div>
  </main>

  <!-- Template edit modal -->
  <div class="modal-backdrop" id="tmpl-modal-overlay" role="dialog" aria-modal="true" aria-labelledby="tmpl-modal-title" hidden>
    <div class="modal">
      <div class="modal-header">
        <h2 class="modal-title-input" id="tmpl-modal-title">New Template</h2>
        <button class="modal-close" id="tmpl-modal-close" aria-label="Close">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
        </button>
      </div>
      <form id="tmpl-form" novalidate>
        <input type="hidden" id="tmpl-id" />
        <div class="form-row">
          <label class="form-label" for="tmpl-title">Title <span style="color:var(--color-error)">*</span></label>
          <input class="form-input" type="text" id="tmpl-title" placeholder="Template title" required />
        </div>
        <div class="date-row">
          <div class="form-row">
            <label class="form-label" for="tmpl-priority">Priority</label>
            <select class="form-select" id="tmpl-priority">
              <option value="low">Low</option>
              <option value="medium" selected>Medium</option>
              <option value="high">High</option>
            </select>
          </div>
          <div class="form-row">
            <label class="form-label" for="tmpl-recurrence">Recurrence</label>
            <select class="form-select" id="tmpl-recurrence">
              <option value="daily">Daily (Mon–Fri)</option>
              <option value="daily-all">Daily (every day)</option>
              <option value="mon">Every Monday</option>
              <option value="tue">Every Tuesday</option>
              <option value="wed">Every Wednesday</option>
              <option value="thu">Every Thursday</option>
              <option value="fri">Every Friday</option>
              <option value="sat">Every Saturday</option>
              <option value="sun">Every Sunday</option>
            </select>
          </div>
        </div>
        <div class="form-row">
          <label class="form-label" for="tmpl-tags">Tags <span style="color:var(--color-text-faint);font-weight:400">(comma separated)</span></label>
          <input class="form-input" type="text" id="tmpl-tags" placeholder="e.g. work, routine" />
        </div>
        <div class="form-row">
          <label class="form-label">Subtasks</label>
          <div id="tmpl-subtask-list" class="subtask-list"></div>
          <div class="subtask-add-row">
            <input class="subtask-add-input" type="text" id="tmpl-new-subtask" placeholder="Add a subtask..." />
            <button type="button" class="subtask-add-btn" id="tmpl-add-subtask-btn">Add</button>
          </div>
        </div>
        <div class="modal-footer">
          <button type="button" class="danger-btn" id="tmpl-delete-btn" hidden>Delete</button>
          <button type="button" class="secondary-btn" id="tmpl-cancel">Cancel</button>
          <button type="submit" class="primary-btn">Save template</button>
        </div>
      </form>
    </div>
  </div>

  <!-- Version footer -->
  <footer class="version-footer" aria-label="App version info">
    <span id="version-badge" class="version-badge">Loading version…</span>
  </footer>

  <script type="module" src="./js/templates-app.js"></script>

  <script>
    (async () => {
      const badge = document.getElementById('version-badge');
      try {
        const res = await fetch('https://api.github.com/repos/dennismzanetti/ToDo/commits/main', {
          headers: { 'Accept': 'application/vnd.github.v3+json' }
        });
        if (!res.ok) throw new Error('API error');
        const data = await res.json();
        const sha = data.sha.slice(0, 7);
        const msg = data.commit.message.split('\n')[0];
        const date = new Date(data.commit.committer.date);
        const formatted = date.toLocaleString(undefined, {
          month: 'short', day: 'numeric', year: 'numeric',
          hour: '2-digit', minute: '2-digit'
        });
        badge.innerHTML =
          '<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" style="display:inline;vertical-align:-1px"><circle cx="12" cy="12" r="3"/><line x1="12" y1="3" x2="12" y2="9"/><line x1="12" y1="15" x2="12" y2="21"/><line x1="3" y1="12" x2="9" y2="12"/><line x1="15" y1="12" x2="21" y2="12"/></svg> ' +
          '<a href="https://github.com/dennismzanetti/ToDo/commit/' + data.sha + '" target="_blank" rel="noopener noreferrer" class="version-sha">' + sha + '</a>' +
          ' &mdash; ' + msg + ' &mdash; ' + formatted;
      } catch {
        badge.textContent = 'Version unavailable';
      }
    })();
  </script>
</body>
</html>
