<body>
  <a class="skip-link" href="#templates-content">Skip to content</a>

        <path d="M15 24l3 3 6-7" stroke="currentColor" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
      <span class="brand-name">To-Do List</span>
    </div>

    <nav class="main-nav" aria-label="Main navigation">
      <a class="nav-btn" href="index.html">
        <svg class="nav-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <rect x="3" y="3" width="7" height="7" rx="1"/>
          <rect x="14" y="3" width="7" height="7" rx="1"/>
          <rect x="3" y="14" width="7" height="7" rx="1"/>
          <rect x="14" y="14" width="7" height="7" rx="1"/>
        </svg>
        <span class="nav-label">Board</span>
      </a>
      <a class="nav-btn" href="todo-list.html">
        <svg class="nav-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <line x1="8" y1="6" x2="21" y2="6"/>
          <line x1="8" y1="12" x2="21" y2="12"/>
          <line x1="8" y1="18" x2="21" y2="18"/>
          <polyline points="3 6 4 7 6 5"/>
          <polyline points="3 12 4 13 6 11"/>
          <polyline points="3 18 4 19 6 17"/>
        </svg>
        <span class="nav-label">Tasks</span>
      </a>
      <a class="nav-btn active" href="templates.html" aria-current="page">
        <svg class="nav-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <rect x="3" y="3" width="18" height="18" rx="2"/>

        </svg>
        <span class="nav-label">Templates</span>

      <a class="nav-btn" href="settings.html">

          <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>

    <button class="icon-btn" data-theme-toggle aria-label="Toggle theme">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></svg>
    </button>
  </header>

  <main id="templates-content" class="templates-page">
    <div class="templates-content">
      <div class="templates-header">
        <div>
          <h1 class="templates-title">Templates</h1>
          <p class="text-muted">Recurring tasks automatically added to your board.</p>
        </div>
        <button class="new-template-btn" id="new-template-btn">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
          New Template
        </button>
      </div>

      <div class="templates-grid" id="templates-grid"></div>
    </div>
  </main>

  <!-- Template edit modal -->
  <div class="modal-overlay" id="tmpl-modal-overlay" role="dialog" aria-modal="true" aria-labelledby="tmpl-modal-title" hidden>
    <div class="modal">
      <div class="modal-header">
        <h2 class="modal-title" id="tmpl-modal-title">New Template</h2>
        <button class="icon-btn modal-close" id="tmpl-modal-close" aria-label="Close modal">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
        </button>
      </div>
      <form id="tmpl-form" novalidate>
        <input type="hidden" id="tmpl-edit-id" />
        <div class="modal-body">
          <div class="form-grid">

            <label class="form-field full-width">
              <span>Title <span class="required">*</span></span>
              <input type="text" id="tmpl-title" placeholder="Template title" required />
            </label>

            <label class="form-field">
              <span>Priority</span>
              <select id="tmpl-priority">
                <option value="low">Low</option>
                <option value="medium" selected>Medium</option>
                <option value="high">High</option>
              </select>
            </label>

            <label class="form-field">
              <span>Recurrence</span>
              <select id="tmpl-recurrence">
                <option value="daily">Daily (Mon–Fri)</option>
                <option value="daily-all">Every day</option>
                <option value="mon">Every Monday</option>
                <option value="tue">Every Tuesday</option>
                <option value="wed">Every Wednesday</option>
                <option value="thu">Every Thursday</option>
                <option value="fri">Every Friday</option>
                <option value="sat">Every Saturday</option>
                <option value="sun">Every Sunday</option>
              </select>
            </label>

            <label class="form-field full-width">
              <span>Tags <span class="hint">(comma separated)</span></span>
              <input type="text" id="tmpl-tags" placeholder="e.g. work, urgent" />
            </label>

            <label class="form-field full-width">
              <span>Notes</span>
              <textarea id="tmpl-notes" placeholder="Add any notes or details..."></textarea>
            </label>

            <div class="form-field full-width">
              <span>Subtasks</span>
              <div id="tmpl-subtask-list" class="subtask-list"></div>
              <div class="subtask-add-row">
                <input type="text" class="subtask-input" id="tmpl-new-subtask-input" placeholder="Add a subtask..." />
                <button type="button" class="subtask-add-btn" id="tmpl-add-subtask-btn">Add</button>
              </div>
            </div>

          </div>
        </div>
        <div class="modal-actions">
          <button type="button" class="btn btn-danger" id="tmpl-delete-btn" style="visibility:hidden">Delete template</button>
          <div class="modal-actions-right">
            <button type="button" class="btn btn-ghost" id="tmpl-modal-cancel">Cancel</button>
            <button type="submit" class="btn btn-primary">Save</button>
          </div>
        </div>
      </form>
    </div>
  </div>

  <!-- Build footer -->
  <footer class="build-footer" id="build-footer" aria-label="Build information">
    <span id="build-badge">Loading build…</span>
  </footer>

  <script type="module" src="./js/templates-app.js"></script>
  <script src="./js/version.js" defer></script>
</body>
</html>
