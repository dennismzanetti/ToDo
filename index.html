<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="To-Do" />
  <meta name="theme-color" content="#5b3ebd" media="(prefers-color-scheme: light)" />
  <meta name="theme-color" content="#9b82f5" media="(prefers-color-scheme: dark)" />
  <title>To-Do List</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://api.fontshare.com/v2/css?f[]=cabinet-grotesk@700,800&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./css/styles.css" />
  <link rel="stylesheet" href="./css/mobile.css" />
  <link rel="manifest" href="./manifest.json" />
  <link rel="apple-touch-icon" href="./icons/icon-192.png" />
</head>
<body>
  <a class="skip-link" href="#board">Skip to content</a>

  <header class="topbar">
    <div class="brand">
      <svg viewBox="0 0 64 64" aria-label="To-Do List" role="img" class="logo" width="36" height="36">
        <rect x="10" y="8" width="44" height="48" rx="10" stroke="currentColor" stroke-width="4" fill="none"/>
        <path d="M20 24h24M20 34h24M20 44h14" stroke="currentColor" stroke-width="4" stroke-linecap="round"/>
        <path d="M15 24l3 3 6-7" stroke="currentColor" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
      <span class="brand-name">To-Do List</span>
    </div>

    <nav class="main-nav" aria-label="Main navigation">
      <a class="nav-btn active" href="index.html" aria-current="page">
        <svg class="nav-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <rect x="3" y="3" width="7" height="7" rx="1"/>
          <rect x="14" y="3" width="7" height="7" rx="1"/>
          <rect x="3" y="14" width="7" height="7" rx="1"/>
          <rect x="14" y="14" width="7" height="7" rx="1"/>
        </svg>
        <span class="nav-label">Board</span>
      </a>
      <a class="nav-btn" href="templates.html">
        <svg class="nav-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <rect x="3" y="3" width="18" height="18" rx="2"/>
          <path d="M3 9h18M9 21V9"/>
        </svg>
        <span class="nav-label">Templates</span>
      </a>
    </nav>

    <div class="week-nav" id="week-nav">
      <button class="icon-btn" id="prev-week" aria-label="Previous week">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
      </button>
      <span class="week-label" id="week-label"></span>
      <button class="icon-btn" id="next-week" aria-label="Next week">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg>
      </button>
      <button class="today-btn" id="today-btn">Today</button>
    </div>

    <!-- Today button visible in header on mobile -->
    <button class="today-btn today-btn--mobile" id="today-btn-mobile" aria-label="Go to today">Today</button>

    <button class="icon-btn" data-theme-toggle aria-label="Toggle theme">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></svg>
    </button>
  </header>

  <!-- Board view -->
  <main id="board" class="board view active"></main>

  <!-- Task edit modal -->
  <div class="modal-overlay" id="modal-overlay" role="dialog" aria-modal="true" aria-labelledby="modal-title" hidden>
    <div class="modal">
      <div class="modal-header">
        <h2 class="modal-title" id="modal-title">Edit Task</h2>
        <button class="icon-btn modal-close" id="modal-close" aria-label="Close modal">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
        </button>
      </div>
      <form id="task-form" novalidate>
        <input type="hidden" id="edit-task-id" />
        <div class="modal-body">
          <div class="form-grid">
            <label class="form-field full-width">
              <span>Title <span class="required">*</span></span>
              <input type="text" id="edit-title" placeholder="Task title" required />
            </label>

            <div class="form-field full-width">
              <span>Do On <span class="hint">(day(s) shown on board)</span></span>
              <div class="date-span-row">
                <div>
                  <label for="edit-do-on-from">From</label>
                  <input type="date" id="edit-do-on-from" />
                </div>
                <div class="date-span-arrow" aria-hidden="true">&#8594;</div>
                <div>
                  <label for="edit-do-on-to">To</label>
                  <input type="date" id="edit-do-on-to" />
                </div>
              </div>
            </div>

            <label class="form-field">
              <span>Priority</span>
              <select id="edit-priority">
                <option value="low">Low</option>
                <option value="medium" selected>Medium</option>
                <option value="high">High</option>
              </select>
            </label>

            <div class="form-field">
              <span>Due Date <span class="hint">(deadline)</span></span>
              <div class="date-clear-row">
                <input type="date" id="edit-due-date" />
                <button type="button" class="clear-date-btn" id="clear-due-date" aria-label="Clear due date" title="Clear due date">&times;</button>
              </div>
            </div>

            <label class="form-field full-width">
              <span>Tags <span class="hint">(comma separated)</span></span>
              <input type="text" id="edit-tags" placeholder="e.g. work, urgent" />
            </label>

            <label class="form-field full-width">
              <span>Notes</span>
              <textarea id="edit-notes" placeholder="Add any notes or details..."></textarea>
            </label>

            <div class="form-field full-width">
              <span>Subtasks</span>
              <div id="subtask-list" class="subtask-list"></div>
              <div class="subtask-add-row">
                <input type="text" class="subtask-input" id="new-subtask-input" placeholder="Add a subtask..." />
                <button type="button" class="subtask-add-btn" id="add-subtask-btn">Add</button>
              </div>
            </div>
          </div>
        </div>
        <div class="modal-actions">
          <button type="button" class="btn btn-danger" id="delete-task-btn">Delete task</button>
          <div class="modal-actions-right">
            <button type="button" class="btn btn-ghost" id="modal-cancel">Cancel</button>
            <button type="submit" class="btn btn-primary">Save</button>
          </div>
        </div>
      </form>
    </div>
  </div>

  <!-- Version footer -->
  <footer class="version-footer" id="version-footer" aria-label="App version info">
    <span id="version-badge" class="version-badge">Loading version…</span>
  </footer>

  <script type="module" src="./js/app.js"></script>

  <script>
    (async () => {
      const badge = document.getElementById('version-badge');
      try {
        const res = await fetch('https://api.github.com/repos/dennismzanetti/ToDo/commits/main', {
          headers: { 'Accept': 'application/vnd.github.v3+json' }
        });
        if (!res.ok) throw new Error('API error');
        const data = await res.json();
        const sha = data.sha.slice(0, 7);
        const msg = data.commit.message.split('\n')[0];
        const date = new Date(data.commit.committer.date);
        const formatted = date.toLocaleString(undefined, {
          month: 'short', day: 'numeric', year: 'numeric',
          hour: '2-digit', minute: '2-digit'
        });

        const isMobile = window.matchMedia('(max-width: 479px)').matches;

        if (isMobile) {
          // Mobile: two-line stacked layout — SHA + message on top, date below
          badge.innerHTML = `
            <span class="version-top-line">
              <a href="https://github.com/dennismzanetti/ToDo/commit/${data.sha}" target="_blank" rel="noopener noreferrer" class="version-sha">${sha}</a>
              <span class="version-msg">${msg}</span>
            </span>
            <span class="version-bottom-line">${formatted}</span>
          `;
        } else {
          // Desktop: show everything inline
          badge.innerHTML = `
            <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" style="display:inline;vertical-align:-1px"><circle cx="12" cy="12" r="3"/><line x1="12" y1="3" x2="12" y2="9"/><line x1="12" y1="15" x2="12" y2="21"/><line x1="3" y1="12" x2="9" y2="12"/><line x1="15" y1="12" x2="21" y2="12"/></svg>
            <a href="https://github.com/dennismzanetti/ToDo/commit/${data.sha}" target="_blank" rel="noopener noreferrer" class="version-sha">${sha}</a>
            &mdash; ${msg} &mdash; ${formatted}
          `;
        }
      } catch {
        badge.textContent = 'Version unavailable';
      }
    })();
  </script>
</body>
</html>
