<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>To‑Do</title>
  <link rel="manifest" href="./manifest.json" />
  <meta name="theme-color" content="#f7f6f2" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <link rel="apple-touch-icon" href="./icons/icon-192.png" />
  <link href="https://api.fontshare.com/v2/css?f[]=satoshi@400,500,700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./css/styles.css" />
  <link rel="stylesheet" href="./css/mobile.css" />
</head>
<body>

  <header class="topbar">
    <a href="./index.html" class="logo-link" aria-label="To-Do home">
      <svg class="logo" viewBox="0 0 32 32" fill="none" aria-hidden="true">
        <rect width="32" height="32" rx="8" fill="var(--color-primary)"/>
        <polyline points="8,17 13,22 24,11" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
      <span class="logo-text">To‑Do</span>
    </a>

    <nav class="topbar-nav">
      <a href="./index.html" class="nav-link active">Board</a>
      <a href="./templates.html" class="nav-link">Templates</a>
    </nav>

    <div class="week-nav" id="week-nav">
      <button class="icon-btn" id="prev-week" aria-label="Previous week">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
      </button>
      <button class="icon-btn" id="next-week" aria-label="Next week">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg>
      </button>
      <button class="today-btn" id="today-btn">Today</button>
    </div>

    <!-- Today button visible in header on mobile -->
    <button class="today-btn today-btn--mobile" id="today-btn-mobile" aria-label="Go to today">Today</button>

    <!-- New Task button — desktop only (hidden on mobile via mobile.css) -->
    <button class="btn btn-primary new-task-btn" id="new-task-btn" aria-label="Add new task">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
      New Task
    </button>

    <button class="icon-btn" data-theme-toggle aria-label="Toggle theme">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></svg>
    </button>
  </header>

  <!-- Board view -->
  <main id="board" class="board view active"></main>

  <!-- Edit / New Task Modal -->
  <div id="modal-overlay" class="modal-overlay" hidden>
    <div class="modal" role="dialog" aria-modal="true" aria-labelledby="modal-title">
      <div class="modal-header">
        <h2 class="modal-title" id="modal-title">Edit Task</h2>
        <button class="icon-btn" id="modal-close" aria-label="Close">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
        </button>
      </div>
      <div class="modal-body">
        <form id="task-form">
          <div class="form-group">
            <label for="edit-title">Title</label>
            <input id="edit-title" type="text" required placeholder="Task title" />
          </div>

          <div class="form-row">
            <div class="form-group">
              <label for="edit-priority">Priority</label>
              <select id="edit-priority">
                <option value="low">Low</option>
                <option value="medium" selected>Medium</option>
                <option value="high">High</option>
              </select>
            </div>
          </div>

          <div class="form-row">
            <div class="form-group">
              <label for="edit-do-on-from">Do On (start)</label>
              <input id="edit-do-on-from" type="date" />
            </div>
            <div class="form-group">
              <label for="edit-do-on-to">Do On (end)</label>
              <input id="edit-do-on-to" type="date" />
            </div>
          </div>

          <div class="form-group">
            <label for="edit-due-date">Due Date</label>
            <div class="input-with-action">
              <input id="edit-due-date" type="date" />
              <button type="button" class="clear-btn" id="clear-due-date" aria-label="Clear due date">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
              </button>
            </div>
          </div>

          <div class="form-group">
            <label for="edit-tags">Tags <span class="label-hint">(comma-separated)</span></label>
            <input id="edit-tags" type="text" placeholder="work, personal, urgent" />
          </div>

          <div class="form-group">
            <label for="edit-notes">Notes</label>
            <textarea id="edit-notes" rows="3" placeholder="Add notes…"></textarea>
          </div>

          <div class="form-group">
            <label>Subtasks</label>
            <div id="subtask-list"></div>
            <div class="subtask-add-row">
              <input id="new-subtask-input" type="text" placeholder="Add subtask…" />
              <button type="button" class="icon-btn" id="add-subtask-btn" aria-label="Add subtask">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
              </button>
            </div>
          </div>

          <div class="modal-actions">
            <button type="button" class="btn btn-danger" id="delete-task-btn">Delete</button>
            <div class="modal-actions-right">
              <button type="button" class="btn btn-ghost" id="modal-cancel">Cancel</button>
              <button type="submit" class="btn btn-primary">Save</button>
            </div>
          </div>
        </form>
      </div>
    </div>
  </div>

  <script type="module" src="./js/app.js"></script>
  <script>
    // Firebase config injected at runtime via GitHub raw + fetch trick
    // All firebase init is in firebase-config.js → firebase.js → store.js
  </script>
  <script>
    // Minimal inline theme bootstrap (before module loads) to prevent flash
    (function(){
      const stored = null; // no localStorage in sandbox
      const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
      // Default light; dark only if system prefers
      document.documentElement.setAttribute('data-theme', prefersDark ? 'dark' : 'light');
    })();
  </script>
  <!-- Dev note: remove this fetch shim in production -->
  <script>
    // GitHub Pages doesn't serve firebase-config.js as a module by default,
    // so we inline the config object here as a global fallback.
    window.__firebaseConfig = {
      apiKey: "AIzaSyCHcCMIUxRrmTW0ePMt2GV6CaHHhEP9hHk",
      authDomain: "to-do-1df69.firebaseapp.com",
      projectId: "to-do-1df69",
      storageBucket: "to-do-1df69.firebasestorage.app",
      messagingSenderId: "308118637748",
      appId: "1:308118637748:web:c07b99680e2ef6f4bfc73f",
      headers: { 'Accept': 'application/vnd.github.v3+json' }
    };
  </script>
</body>
</html>
