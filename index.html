<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="To-Do" />
  <meta name="theme-color" content="#5b3ebd" media="(prefers-color-scheme: light)" />
  <meta name="theme-color" content="#9b82f5" media="(prefers-color-scheme: dark)" />
  <title>To-Do List</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://api.fontshare.com/v2/css?f[]=cabinet-grotesk@700,800&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./css/styles.css" />
  <link rel="stylesheet" href="./css/board.css" />
  <link rel="stylesheet" href="./css/modal.css" />
  <link rel="stylesheet" href="./css/mobile.css" />
  <link rel="manifest" href="./manifest.json" />
  <link rel="apple-touch-icon" href="./icons/icon-192.png" />
</head>
<body>
  <a class="skip-link" href="#board">Skip to content</a>

  <header class="topbar">
    <div class="brand">
      <svg viewBox="0 0 64 64" aria-label="To-Do List" role="img" class="logo" width="36" height="36">
        <rect x="10" y="8" width="44" height="48" rx="10" stroke="currentColor" stroke-width="4" fill="none"/>
        <path d="M20 24h24M20 34h24M20 44h14" stroke="currentColor" stroke-width="4" stroke-linecap="round"/>
        <path d="M15 24l3 3 6-7" stroke="currentColor" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
      <span class="brand-name">To-Do List</span>
    </div>

    <nav class="main-nav" aria-label="Main navigation">
      <a class="nav-btn active" href="index.html" aria-current="page">
        <svg class="nav-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <rect x="3" y="3" width="7" height="7" rx="1"/>
          <rect x="14" y="3" width="7" height="7" rx="1"/>
          <rect x="3" y="14" width="7" height="7" rx="1"/>
          <rect x="14" y="14" width="7" height="7" rx="1"/>
        </svg>
        <span class="nav-label">Board</span>
      </a>
      <a class="nav-btn" href="todo-list.html">
        <svg class="nav-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <line x1="8" y1="6" x2="21" y2="6"/>
          <line x1="8" y1="12" x2="21" y2="12"/>
          <line x1="8" y1="18" x2="21" y2="18"/>
          <polyline points="3 6 4 7 6 5"/>
          <polyline points="3 12 4 13 6 11"/>
          <polyline points="3 18 4 19 6 17"/>
        </svg>
        <span class="nav-label">Tasks</span>
      </a>
      <a class="nav-btn" href="templates.html">
        <svg class="nav-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <rect x="3" y="3" width="18" height="18" rx="2"/>
          <path d="M3 9h18M9 21V9"/>
        </svg>
        <span class="nav-label">Templates</span>
      </a>
      <a class="nav-btn" href="settings.html">
        <svg class="nav-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <circle cx="12" cy="12" r="3"/>
          <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
        </svg>
        <span class="nav-label">Settings</span>
      </a>
    </nav>

    <div class="week-nav" id="week-nav">
      <button class="icon-btn" id="prev-week" aria-label="Previous week">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
      </button>
      <span class="week-label" id="week-label"></span>
      <button class="icon-btn" id="next-week" aria-label="Next week">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg>
      </button>
      <button class="today-btn" id="today-btn">Today</button>
    </div>

    <button class="header-add-btn" id="header-add-btn" aria-label="Add task">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
      <span>Add Task</span>
    </button>

    <button class="today-btn today-btn--mobile" id="today-btn-mobile" aria-label="Go to today">Today</button>

    <button class="icon-btn" data-theme-toggle aria-label="Toggle theme">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></svg>
    </button>
  </header>

  <main id="board" class="board view active"></main>

  <!-- Task edit / new modal -->
  <div class="modal-overlay" id="modal-overlay" role="dialog" aria-modal="true" aria-labelledby="modal-title" hidden>
    <div class="modal">

      <div class="modal-header">
        <h2 class="modal-title" id="modal-title">New Task</h2>
        <button class="icon-btn modal-close" id="modal-close" aria-label="Close modal">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
        </button>
      </div>

      <form id="task-form" novalidate>
        <input type="hidden" id="edit-task-id" />

        <div class="modal-body">

          <div class="form-group">
            <label class="form-label" for="edit-title">
              Title <span class="form-required">*</span>
            </label>
            <input class="form-input" type="text" id="edit-title" placeholder="What needs to be done?" required autocomplete="off" />
          </div>

          <div class="form-group">
            <span class="form-label">Priority</span>
            <div class="priority-group" role="group" aria-label="Priority">
              <button type="button" class="priority-btn" data-priority="low">Low</button>
              <button type="button" class="priority-btn" data-priority="medium">Medium</button>
              <button type="button" class="priority-btn" data-priority="high">High</button>
            </div>
            <select id="edit-priority" class="sr-only" aria-hidden="true" tabindex="-1">
              <option value="low">Low</option>
              <option value="medium" selected>Medium</option>
              <option value="high">High</option>
            </select>
          </div>

          <div class="form-group">
            <label class="form-label" for="edit-category">Category</label>
            <select class="form-input" id="edit-category">
              <option value="">None</option>
            </select>
          </div>

          <div class="form-group">
            <label class="form-label" for="edit-assigned-to">Assigned To</label>
            <input class="form-input" type="text" id="edit-assigned-to" placeholder="Who is this assigned to?" autocomplete="off" maxlength="80" />
          </div>

          <div class="form-group">
            <span class="form-label">
              Do On
              <span class="form-hint">days shown on board</span>
            </span>
            <div class="modal-date-row">
              <button type="button" class="modal-today-btn" id="do-on-today" aria-label="Set Do On to today">Today</button>

              <!-- From: visible text display + hidden date proxy -->
              <div class="modal-date-field">
                <label class="modal-date-label" for="edit-do-on-from-display">From</label>
                <div class="date-proxy-wrap">
                  <input class="form-input date-display" type="text" id="edit-do-on-from-display"
                    placeholder="mm/dd/yyyy" readonly aria-label="Do On from date" />
                  <input class="date-proxy" type="date" id="edit-do-on-from"
                    aria-hidden="true" tabindex="-1" />
                  <button type="button" class="date-clear-btn" id="clear-do-on-from"
                    aria-label="Clear from date" style="display:none">
                    <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
                  </button>
                </div>
              </div>

              <div class="modal-date-arrow" aria-hidden="true">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="13 6 19 12 13 18"/></svg>
              </div>

              <!-- To: visible text display + hidden date proxy -->
              <div class="modal-date-field">
                <label class="modal-date-label" for="edit-do-on-to-display">To</label>
                <div class="date-proxy-wrap">
                  <input class="form-input date-display" type="text" id="edit-do-on-to-display"
                    placeholder="mm/dd/yyyy" readonly aria-label="Do On to date" />
                  <input class="date-proxy" type="date" id="edit-do-on-to"
                    aria-hidden="true" tabindex="-1" />
                  <button type="button" class="date-clear-btn" id="clear-do-on-to"
                    aria-label="Clear to date" style="display:none">
                    <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
                  </button>
                </div>
              </div>
            </div>
          </div>

          <!-- Carry Forward toggle — only meaningful when a Do On date is set -->
          <div class="form-group form-group--inline">
            <label class="form-label form-label--checkbox" for="edit-carry-forward">
              <input type="checkbox" id="edit-carry-forward" />
              Carry Forward
              <span class="form-hint">move to today if past due and incomplete</span>
            </label>
          </div>

          <div class="modal-two-col">
            <div class="form-group">
              <span class="form-label">
                Due Date
                <span class="form-hint">deadline</span>
              </span>
              <div class="modal-due-row">
                <input class="form-input" type="date" id="edit-due-date" />
                <button type="button" class="modal-clear-btn" id="clear-due-date" aria-label="Clear due date" title="Clear due date">
                  <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
                </button>
              </div>
            </div>

            <div class="form-group">
              <label class="form-label" for="edit-tags">
                Tags
                <span class="form-hint">comma separated</span>
              </label>
              <input class="form-input" type="text" id="edit-tags" placeholder="work, urgent&#x2026;" autocomplete="off" />
            </div>
          </div>

          <div class="form-group">
            <label class="form-label" for="edit-notes">Notes</label>
            <textarea class="form-input form-textarea" id="edit-notes" placeholder="Add any details or context&#x2026;" rows="3"></textarea>
          </div>

          <div class="form-group">
            <span class="form-label">Subtasks</span>
            <div id="subtask-list" class="subtask-list"></div>
            <div class="subtask-add-row">
              <input type="text" class="form-input subtask-input" id="new-subtask-input" placeholder="Add a subtask&#x2026;" autocomplete="off" />
              <button type="button" class="subtask-add-btn" id="add-subtask-btn">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
                Add
              </button>
            </div>
          </div>

        </div>

        <div class="modal-actions">
          <button type="button" class="btn btn-danger" id="delete-task-btn">Delete task</button>
          <div class="modal-actions-right">
            <button type="button" class="btn btn-ghost" id="modal-cancel">Cancel</button>
            <button type="submit" class="btn btn-primary">Save task</button>
          </div>
        </div>

      </form>
    </div>
  </div>

  <!-- Build footer -->
  <footer class="build-footer" id="build-footer" aria-label="Build information">
    <span id="build-badge">Loading build&#x2026;</span>
  </footer>

  <script type="module" src="./js/app.js"></script>
  <script src="./js/version.js" defer></script>
</body>
</html>
